<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>Vampire Dungeon</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap');

:root{
  --bg:#0b0710; --panel:#1a1424; --panel2:#241a33; --border:#3a2b52;
  --gold:#e8c468; --hp:#d4313d; --xp:#37c9ff; --text:#f1e9d8; --muted:#a695bf;
  --green:#7fff5a;
}
*{ box-sizing:border-box; -webkit-tap-highlight-color: transparent; user-select:none; -webkit-user-select:none; }
html,body{ margin:0; padding:0; width:100%; height:100%; background:var(--bg); overflow:hidden; font-family:'VT323',monospace; color:var(--text); }
#app{ position:fixed; inset:0; overflow:hidden; }
canvas{ position:absolute; inset:0; display:block; image-rendering:pixelated; image-rendering:crisp-edges; touch-action:none; }

.titleFont{ font-family:'Press Start 2P',monospace; }

/* ===== screens ===== */
.screen{ position:absolute; inset:0; z-index:30; display:flex; flex-direction:column; align-items:center; justify-content:center;
  background:radial-gradient(ellipse at center, #1c1228 0%, #0b0710 75%); overflow-y:auto; padding:18px; }
.hidden{ display:none !important; }

#mainMenu h1{ font-size:clamp(20px,4.2vw,40px); color:var(--gold); letter-spacing:2px; text-shadow:0 0 18px #e8c46877, 3px 3px 0 #5a3a1a; margin:0 0 6px; text-align:center; }
#mainMenu .subtitle{ color:var(--muted); font-size:18px; margin-bottom:22px; letter-spacing:1px; }
.menu-buttons{ display:flex; flex-direction:column; gap:12px; width:min(360px,80vw); }
.bigBtn{ font-family:'VT323',monospace; font-size:24px; letter-spacing:2px; padding:13px 18px; background:linear-gradient(180deg,var(--panel2),var(--panel)); border:2px solid var(--border); color:var(--text); border-radius:8px; cursor:pointer; box-shadow:0 3px 0 #000a, inset 0 1px 0 #ffffff14; }
.bigBtn:active{ transform:translateY(2px); box-shadow:0 1px 0 #000a; }
.bigBtn.primary{ border-color:var(--gold); color:var(--gold); }
.bigBtn.small{ font-size:18px; padding:9px 14px; }
.metaRow{ display:flex; gap:22px; margin-top:20px; color:var(--muted); font-size:18px; }
.metaRow b{ color:var(--gold); }

.backBtn{ position:absolute; top:14px; left:14px; font-family:'VT323'; font-size:18px; background:var(--panel); border:2px solid var(--border); color:var(--text); padding:6px 14px; border-radius:6px; cursor:pointer; z-index:5; }
.screenTitle{ font-family:'Press Start 2P'; font-size:16px; color:var(--gold); margin-bottom:14px; text-align:center; }

/* character select */
#charCards{ display:flex; gap:14px; flex-wrap:wrap; justify-content:center; max-width:920px; }
.charCard{ width:155px; background:var(--panel); border:2px solid var(--border); border-radius:10px; padding:12px; text-align:center; display:flex; flex-direction:column; gap:5px; align-items:center; }
.charCard.locked{ opacity:0.55; }
.charIcon{ width:46px; height:46px; border-radius:8px; border:2px solid #00000055; margin-bottom:2px; }
.charPortrait{ width:90px; height:90px; object-fit:contain; image-rendering:pixelated; border-radius:8px; background:#12091f; border:2px solid #3a2b52; margin-bottom:4px; }
.charName{ font-size:20px; color:var(--gold); }
.charDesc{ font-size:14px; color:var(--muted); min-height:32px; font-family:system-ui,sans-serif; }
.charPassive{ font-size:13px; color:var(--green); font-family:system-ui,sans-serif; min-height:30px; }
.selBtn{ margin-top:6px; width:100%; padding:7px; font-family:'VT323'; font-size:18px; background:var(--panel2); border:2px solid var(--gold); color:var(--gold); border-radius:6px; cursor:pointer; }
.selBtn.lockBtn{ border-color:var(--muted); color:var(--muted); }
#challengeNote{ margin-top:14px; color:var(--green); font-size:18px; }

/* shop */
#shopCards{ display:flex; gap:12px; flex-wrap:wrap; justify-content:center; max-width:900px; }
.shopCard{ width:160px; background:var(--panel); border:2px solid var(--border); border-radius:10px; padding:10px; text-align:center; }
.shopIcon{ font-size:24px; margin-bottom:2px; }
.shopName{ font-size:18px; color:var(--gold); }
.shopLvl{ font-size:13px; color:var(--muted); display:block; }
.shopDesc{ font-size:13px; color:var(--muted); font-family:system-ui,sans-serif; min-height:30px; margin:4px 0; }
.buyBtn{ width:100%; padding:6px; font-family:'VT323'; font-size:16px; background:var(--panel2); border:2px solid var(--gold); color:var(--gold); border-radius:6px; cursor:pointer; }
.buyBtn:disabled{ border-color:var(--muted); color:var(--muted); cursor:default; }
#shopGoldRow{ margin-bottom:14px; color:var(--gold); font-size:20px; }

/* achievements */
#achList{ width:min(480px,90vw); display:flex; flex-direction:column; gap:8px; }
.achRow{ display:flex; gap:10px; align-items:center; background:var(--panel); border:2px solid var(--border); border-radius:8px; padding:8px 12px; opacity:0.6; }
.achRow.got{ opacity:1; border-color:var(--gold); }
.achDot{ font-size:20px; color:var(--gold); width:20px; text-align:center; }
.achName{ font-size:18px; color:var(--text); }
.achDesc{ font-size:13px; color:var(--muted); font-family:system-ui,sans-serif; }

/* ===== HUD ===== */
#hud{ position:absolute; inset:0; z-index:10; pointer-events:none; }
#topBar{ position:absolute; top:0; left:0; right:0; padding:8px 56px 4px 10px; }
#xpTrack{ height:9px; background:#000a; border:1px solid #000; border-radius:5px; overflow:hidden; }
#xpFill{ height:100%; width:0%; background:linear-gradient(90deg,#1c8fc4,var(--xp)); transition:width .15s; }
#statsRow{ display:flex; justify-content:space-between; align-items:center; margin-top:4px; font-size:19px; }
.statChip{ background:#000000aa; border:1px solid var(--border); border-radius:6px; padding:2px 9px; display:flex; align-items:center; gap:5px; }
.statChip .ic{ color:var(--gold); }
#bossBar{ position:absolute; top:46px; left:50%; transform:translateX(-50%); width:min(360px,70vw); text-align:center; }
#bossName{ font-size:15px; color:#ff8a8a; text-shadow:1px 1px 0 #000; }
#bossTrack{ height:10px; background:#000a; border:1px solid #000; border-radius:5px; overflow:hidden; margin-top:2px; }
#bossFill{ height:100%; width:100%; background:linear-gradient(90deg,#7a0d18,#ff3b3b); }
#eventBanner{ position:absolute; top:78px; left:50%; transform:translateX(-50%); background:#000000cc; border:1px solid var(--gold); color:var(--gold); padding:3px 14px; border-radius:6px; font-size:15px; letter-spacing:1px; }

#btnPause{ position:absolute; top:8px; right:10px; pointer-events:auto; width:38px; height:38px; background:#000000aa; border:1px solid var(--border); border-radius:8px; color:var(--text); font-size:18px; cursor:pointer; }

#joyZone{ position:absolute; left:0; bottom:0; width:50%; height:55%; z-index:8; pointer-events:auto; }
#joyBase{ position:absolute; width:84px; height:84px; margin-left:-42px; margin-top:-42px; border:2px solid #ffffff55; border-radius:50%; opacity:0; pointer-events:none; transition:opacity .1s; }
#joyStick{ position:absolute; width:38px; height:38px; margin-left:-19px; margin-top:-19px; background:#ffffff44; border:2px solid #ffffff88; border-radius:50%; opacity:0; pointer-events:none; transition:opacity .1s; }

/* ===== modals ===== */
.modal{ position:absolute; inset:0; z-index:40; background:#05030acc; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:16px; }
#levelTitle{ font-family:'Press Start 2P'; font-size:18px; color:var(--gold); margin-bottom:16px; text-shadow:0 0 12px #e8c46888; }
#levelCards{ display:flex; gap:14px; flex-wrap:wrap; justify-content:center; max-width:760px; }
.levelCard{ width:170px; background:var(--panel); border:2px solid var(--border); border-radius:10px; padding:14px 10px; text-align:center; cursor:pointer; transition:transform .1s, border-color .1s; }
.levelCard:hover, .levelCard:active{ border-color:var(--gold); transform:translateY(-3px); }
.lcIcon{ width:34px; height:34px; border-radius:7px; margin:0 auto 8px; border:2px solid #00000055; }
.lcName{ font-size:18px; color:var(--gold); }
.lcDesc{ font-size:13px; color:var(--muted); margin-top:4px; font-family:system-ui,sans-serif; }

#pauseModal h2, #gameOverModal h2{ font-family:'Press Start 2P'; font-size:20px; color:var(--gold); margin-bottom:18px; }
#goStats{ display:flex; flex-direction:column; gap:6px; font-size:20px; margin-bottom:20px; text-align:center; }
#goStats b{ color:var(--gold); }

#toastLayer{ position:absolute; top:90px; left:50%; transform:translateX(-50%); z-index:60; display:flex; flex-direction:column; gap:6px; align-items:center; pointer-events:none; }
.toast{ background:#000000dd; border:1px solid var(--gold); color:var(--gold); padding:5px 16px; border-radius:7px; font-size:16px; opacity:0; transform:translateY(-8px); transition:all .3s; }
.toast.show{ opacity:1; transform:translateY(0); }

#rotateHint{ position:fixed; inset:0; z-index:100; background:#0b0710; display:none; align-items:center; justify-content:center; flex-direction:column; text-align:center; padding:20px; }
#rotateHint .ic{ font-size:48px; margin-bottom:12px; }
@media (orientation:portrait) and (max-width:900px){ #rotateHint{ display:flex; } }
</style>
</head>
<body>
<div id="app">
<canvas id="game"></canvas>

<div id="rotateHint"><div class="ic">⟳</div><div class="titleFont" style="font-size:14px;color:#e8c468;">ROTATE TO LANDSCAPE</div><div style="color:#a695bf;margin-top:8px;font-size:18px;">Vampire Dungeon plays best sideways</div></div>

<!-- MAIN MENU -->
<div id="mainMenu" class="screen">
  <h1 class="titleFont">VAMPIRE DUNGEON</h1>
  <div class="subtitle">Survive the endless horde</div>
  <div class="menu-buttons">
    <button class="bigBtn primary" id="btnPlay">▶ PLAY</button>
    <button class="bigBtn" id="btnDaily">☄ DAILY CHALLENGE</button>
    <button class="bigBtn" id="btnShop">⚒ UPGRADES</button>
    <button class="bigBtn" id="btnAch">★ ACHIEVEMENTS</button>
  </div>
  <div class="metaRow">
    <div>GOLD: <b id="metaGold">0</b></div>
    <div>BEST TIME: <b id="bestSurvival">0:00</b></div>
    <div>BEST KILLS: <b id="bestKills">0</b></div>
  </div>
</div>

<!-- CHARACTER SELECT -->
<div id="charSelect" class="screen hidden">
  <button class="backBtn" id="backFromChar">← BACK</button>
  <div class="screenTitle">CHOOSE YOUR HERO</div>
  <div id="charCards"></div>
  <div id="challengeNote" class="hidden"></div>
</div>

<!-- SHOP -->
<div id="shopScreen" class="screen hidden">
  <button class="backBtn" id="backFromShop">← BACK</button>
  <div class="screenTitle">PERMANENT UPGRADES</div>
  <div id="shopGoldRow">GOLD: <span id="shopGold">0</span></div>
  <div id="shopCards"></div>
</div>

<!-- ACHIEVEMENTS -->
<div id="achScreen" class="screen hidden">
  <button class="backBtn" id="backFromAch">← BACK</button>
  <div class="screenTitle">ACHIEVEMENTS</div>
  <div id="achList"></div>
</div>

<!-- HUD -->
<div id="hud" class="hidden">
  <div id="topBar">
    <div id="xpTrack"><div id="xpFill"></div></div>
    <div id="statsRow">
      <div class="statChip"><span class="ic">Lv</span><span id="hudLevel">Lv 1</span></div>
      <div class="statChip" id="hudTimeChip"><span id="hudTime">0:00</span></div>
      <div class="statChip">💀<span id="hudKills">0</span></div>
      <div class="statChip">$<span id="hudGold">0</span></div>
    </div>
  </div>
  <div id="bossBar" class="hidden">
    <div id="bossName">Boss</div>
    <div id="bossTrack"><div id="bossFill"></div></div>
  </div>
  <div id="eventBanner" class="hidden">Event</div>
  <button id="btnPause">II</button>
  <div id="joyZone"></div>
  <div id="joyBase"></div>
  <div id="joyStick"></div>
</div>

<!-- LEVEL UP MODAL -->
<div id="levelUpModal" class="modal hidden">
  <div id="levelTitle">LEVEL UP</div>
  <div id="levelCards"></div>
</div>

<!-- PAUSE MODAL -->
<div id="pauseModal" class="modal hidden">
  <h2 class="titleFont">PAUSED</h2>
  <div class="menu-buttons">
    <button class="bigBtn primary" id="btnResume">▶ RESUME</button>
    <button class="bigBtn" id="btnQuit">QUIT TO MENU</button>
  </div>
</div>

<!-- GAME OVER MODAL -->
<div id="gameOverModal" class="modal hidden">
  <h2 class="titleFont">YOU FELL...</h2>
  <div id="goStats"></div>
  <div class="menu-buttons">
    <button class="bigBtn primary" id="btnRestart">↻ PLAY AGAIN</button>
    <button class="bigBtn" id="btnMenu2">MAIN MENU</button>
  </div>
</div>

<div id="toastLayer"></div>

</div>

// ---------- CANVAS ----------
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
let W = 0, H = 0;
function resize(){
  W = canvas.width = Math.floor(window.innerWidth);
  H = canvas.height = Math.floor(window.innerHeight);
}
window.addEventListener('resize', resize);
resize();

const rand = (a,b)=> a + Math.random()*(b-a);
const randi = (a,b)=> Math.floor(rand(a,b+1));
const choice = (arr)=> arr[Math.floor(Math.random()*arr.length)];
const clamp = (v,a,b)=> Math.max(a,Math.min(b,v));
const dist2 = (ax,ay,bx,by)=>{ const dx=ax-bx, dy=ay-by; return dx*dx+dy*dy; };

// ---------- AUDIO ----------
let audioCtx = null;
function ensureAudio(){
  if(!audioCtx){
    try{ audioCtx = new (window.AudioContext||window.webkitAudioContext)(); }catch(e){}
  } else if(audioCtx.state === 'suspended'){ audioCtx.resume(); }
}
function beep(freq, dur, type, vol, slideTo){
  if(!audioCtx) return;
  try{
    const o = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    o.type = type || 'square';
    o.frequency.value = freq;
    g.gain.value = vol || 0.04;
    o.connect(g); g.connect(audioCtx.destination);
    const now = audioCtx.currentTime;
    if(slideTo) o.frequency.exponentialRampToValueAtTime(slideTo, now+dur);
    g.gain.exponentialRampToValueAtTime(0.0001, now+dur);
    o.start(now);
    o.stop(now+dur+0.02);
  }catch(e){}
}
const sfx = {
  shoot:()=>beep(520,0.05,'square',0.025,300),
  hit:()=>beep(180,0.06,'square',0.035),
  crit:()=>beep(260,0.09,'square',0.05,120),
  hurt:()=>beep(120,0.15,'sawtooth',0.05,40),
  gem:()=>beep(900,0.045,'sine',0.025,1300),
  coin:()=>beep(700,0.05,'triangle',0.03,1000),
  levelup:()=>{beep(523,0.1,'triangle',0.05,784); setTimeout(()=>beep(784,0.14,'triangle',0.05,1046),90);},
  chest:()=>beep(500,0.12,'triangle',0.045,900),
  evolve:()=>{beep(330,0.12,'triangle',0.06,660); setTimeout(()=>beep(660,0.2,'triangle',0.06,1320),100);},
  boss:()=>beep(70,0.5,'sawtooth',0.06,35),
  death:()=>beep(160,0.4,'sawtooth',0.05,30),
};

// ---------- PIXEL SPRITES ----------
function spriteWH(w,h,draw){
  const c = document.createElement('canvas');
  c.width=w; c.height=h;
  const g = c.getContext('2d');
  draw(g);
  return c;
}
function sprite(res,draw){ return spriteWH(res,res,draw); }
function drawSprite(img,x,y,size,opts){
  if(!img) return;
  if(img instanceof HTMLImageElement && !img.complete) return;
  opts = opts||{};
  const iw = img.naturalWidth||img.width||1, ih = img.naturalHeight||img.height||1;
  let w=size, h=size*(ih/iw);
  if(h>size){ h=size; w=size*(iw/ih); }
  ctx.save();
  ctx.translate(x,y);
  if(opts.rot) ctx.rotate(opts.rot);
  if(opts.flip) ctx.scale(-1,1);
  ctx.globalAlpha = opts.alpha!==undefined?opts.alpha:1;
  ctx.imageSmoothingEnabled = !!opts.smooth;
  if(opts.tint){
    ctx.drawImage(img, -w/2, -h/2, w, h);
    ctx.globalCompositeOperation='source-atop';
    ctx.fillStyle=opts.tint;
    ctx.globalAlpha = (opts.alpha!==undefined?opts.alpha:1)*0.45;
    ctx.fillRect(-w/2,-h/2,w,h);
  } else {
    ctx.drawImage(img, -w/2, -h/2, w, h);
  }
  ctx.imageSmoothingEnabled = false;
  ctx.restore();
}

function heroSprite(skin, garb){
  return sprite(16, g=>{
    g.fillStyle = garb; g.fillRect(4,7,8,8);
    g.fillStyle = '#00000022'; g.fillRect(4,13,8,2);
    g.fillStyle = skin; g.fillRect(5,2,6,6);
    g.fillStyle = '#1a1a22'; g.fillRect(6,4,1,1); g.fillRect(9,4,1,1);
    g.fillStyle = garb; g.fillRect(2,8,2,6); g.fillRect(12,8,2,6);
    g.fillStyle = '#2b2b36'; g.fillRect(4,14,3,2); g.fillRect(9,14,3,2);
    g.fillStyle = shade(garb,-30); g.fillRect(4,7,8,2);
  });
}
function shade(hex, amt){
  const c = hex.replace('#','');
  const r = clamp(parseInt(c.substr(0,2),16)+amt,0,255);
  const gC = clamp(parseInt(c.substr(2,2),16)+amt,0,255);
  const b = clamp(parseInt(c.substr(4,2),16)+amt,0,255);
  return `rgb(${r},${gC},${b})`;
}
function slimeSprite(col){
  return sprite(16, g=>{
    g.fillStyle = col;
    g.beginPath(); g.ellipse(8,10,6,5,0,0,Math.PI*2); g.fill();
    g.fillStyle = shade(col,-40); g.fillRect(2,12,12,3);
    g.fillStyle = '#0c1a12'; g.fillRect(5,8,2,2); g.fillRect(9,8,2,2);
    g.fillStyle = '#ffffff55'; g.fillRect(4,6,3,2);
  });
}
function skeletonSprite(col){

    g.fillStyle = col; g.fillRect(2,8,2,5); g.fillRect(12,8,2,5);
    g.fillRect(4,13,3,2); g.fillRect(9,13,3,2);
  });
}
function batSprite(col){

    g.beginPath(); g.moveTo(8,6); g.lineTo(1,3); g.lineTo(3,9); g.lineTo(8,7); g.fill();
    g.beginPath(); g.moveTo(8,6); g.lineTo(15,3); g.lineTo(13,9); g.lineTo(8,7); g.fill();
    g.beginPath(); g.ellipse(8,8,3,3,0,0,Math.PI*2); g.fill();
    g.fillStyle = '#ff3b3b'; g.fillRect(6,7,1,1); g.fillRect(9,7,1,1);
  });
}
function ghostSprite(col){
  return sprite(16, g=>{
    g.globalAlpha = 0.85;
    g.fillStyle = col;
    g.beginPath(); g.arc(8,8,5,Math.PI,0); g.fill();
    g.fillRect(3,8,10,5);
    for(let i=0;i<4;i++){ g.beginPath(); g.arc(4+i*3,13,1.5,0,Math.PI); g.fill(); }
    g.fillStyle='#13101c'; g.fillRect(5,7,2,2); g.fillRect(9,7,2,2);
  });
}
function demonSprite(col){
  return sprite(16, g=>{
    g.fillStyle = col; g.fillRect(3,5,10,9);
    g.fillStyle = shade(col,-50);
    g.beginPath(); g.moveTo(3,5); g.lineTo(1,1); g.lineTo(5,4); g.fill();

    g.fillStyle = shade(col,-30); g.fillRect(3,13,3,2); g.fillRect(10,13,3,2);

    g.fillStyle = shade(col,-20); g.fillRect(6,10,16,16);

    g.beginPath(); g.moveTo(6,10); g.lineTo(2,1); g.lineTo(10,8); g.fill();

function newPlayer(charDef){
  const p = {
    x:0, y:0, maxHealth:charDef.hp, health:charDef.hp, speed:charDef.speed,
    dmgMult:1, cdMult:1, critChance:0.05, critMult:2.0, armor:0, magnet:90,
    xpMult:1, goldMult:1, hasMinion:false, turretBonus:0,
    weapons:[{ id:charDef.weapon, level:1 }],
    passives:{},
    facing:1, moveX:0, moveY:0, iframe:0, hitFlash:0, revives:0,
    cdTimers:{}, minionAngle:0,
    skin:charDef.skin, garb:charDef.garb,
  };
  charDef.apply(p);
  // meta permanent upgrades
  const dmgLvl = metaUpgradeLevel('dmg'), hpLvl = metaUpgradeLevel('hp'), spdLvl=metaUpgradeLevel('spd'),
        critLvl = metaUpgradeLevel('crit'), xpLvl = metaUpgradeLevel('xp'), goldLvl = metaUpgradeLevel('gold'),
        revLvl = metaUpgradeLevel('revive');
  p.dmgMult *= (1+dmgLvl*0.03);
  p.maxHealth += hpLvl*5; p.health = p.maxHealth;
  p.speed *= (1+spdLvl*0.015);
  p.critChance += critLvl*0.01;
  p.xpMult *= (1+xpLvl*0.03);
  p.goldMult *= (1+goldLvl*0.05);
  p.revives = revLvl>0?1:0;
  const heroImgKey = HERO_ART_MAP[charDef.id];
  if(heroImgKey && REAL_IMGS[heroImgKey]){
    p.sprite = REAL_IMGS[heroImgKey];
    p.spriteIsReal = true;
  } else {
    p.sprite = heroSprite(charDef.skin, charDef.garb);
    p.spriteIsReal = false;
  }
  return p;
}

    const card = document.createElement('div');

function buildShop(){
  const wrap = el('shopCards'); wrap.innerHTML='';

      <div class="shopIcon">${def.icon}</div>

const keys = {};
window.addEventListener('keydown', e=>{ keys[e.key.toLowerCase()]=true; ensureAudio(); });
window.addEventListener('keyup', e=>{ keys[e.key.toLowerCase()]=false; });

let joy = { active:false, baseX:0, baseY:0, x:0, y:0, id:null };
const joyZone = el('joyZone'), joyBase = el('joyBase'), joyStick = el('joyStick');
function joyStart(x,y,id){
  joy.active=true; joy.baseX=x; joy.baseY=y; joy.id=id;
  joyBase.style.left=x+'px'; joyBase.style.top=y+'px'; joyBase.style.opacity=1;
  joyStick.style.left=x+'px'; joyStick.style.top=y+'px'; joyStick.style.opacity=1;
  ensureAudio();
}
function joyMove(x,y){
  if(!joy.active) return;
  let dx=x-joy.baseX, dy=y-joy.baseY;
  const d=Math.hypot(dx,dy), max=42;
  if(d>max){ dx=dx/d*max; dy=dy/d*max; }
  joy.x = dx/max; joy.y = dy/max;
  joyStick.style.left=(joy.baseX+dx)+'px'; joyStick.style.top=(joy.baseY+dy)+'px';
}
function joyEnd(){ joy.active=false; joy.x=0; joy.y=0; joyBase.style.opacity=0; joyStick.style.opacity=0; }
joyZone.addEventListener('touchstart', e=>{
  e.preventDefault();
  const t=e.changedTouches[0];
  joyStart(t.clientX,t.clientY,t.identifier);
},{passive:false});
joyZone.addEventListener('touchmove', e=>{
  e.preventDefault();
  for(const t of e.changedTouches){ if(t.identifier===joy.id) joyMove(t.clientX,t.clientY); }
},{passive:false});
joyZone.addEventListener('touchend', e=>{
  for(const t of e.changedTouches){ if(t.identifier===joy.id) joyEnd(); }
});
// mouse fallback (desktop drag)
let mouseDown=false;
joyZone.addEventListener('mousedown', e=>{ mouseDown=true; joyStart(e.clientX,e.clientY,'mouse'); });
window.addEventListener('mousemove', e=>{ if(mouseDown) joyMove(e.clientX,e.clientY); });
window.addEventListener('mouseup', ()=>{ if(mouseDown){ mouseDown=false; joyEnd(); } });

function getMoveVector(){
  let mx=0,my=0;
  if(keys['w']||keys['arrowup']) my-=1;
  if(keys['s']||keys['arrowdown']) my+=1;
  if(keys['a']||keys['arrowleft']) mx-=1;
  if(keys['d']||keys['arrowright']) mx+=1;
  if(joy.active){ mx+=joy.x; my+=joy.y; }
  const len = Math.hypot(mx,my);
  if(len>1){ mx/=len; my/=len; }
  return {x:mx,y:my};
}

// ---------- RUN LIFECYCLE ----------
let lastT = 0;
function startRun(charId, challengeMod){
  ensureAudio();
  const def = CHARACTERS.find(c=>c.id===charId);
  state = freshState();
  state.charId = charId;
  state.challenge = challengeMod || null;
  state.player = newPlayer(def);
  if(challengeMod==='Random Weapon Start'){
    const ids = Object.keys(WEAPON_DEFS);
    state.player.weapons = [{ id:choice(ids), level:1 }];
  }
  if(challengeMod==='One HP Mode'){ state.player.maxHealth=1; state.player.health=1; }
  showScreen(null);
  el('hud').classList.remove('hidden');
  state.mode='playing';
  lastT = performance.now();
  updateHUD();
}
function endRun(){
  const m = state;
  const goldEarned = Math.round((m.kills*0.4 + m.time*0.35 + (m.activeBoss?0:0))*m.player.goldMult*(state.challenge?1.5:1));
  META.gold += goldEarned;
  META.totalKills += m.kills;
  META.bests.survival = Math.max(META.bests.survival, m.time);
  META.bests.kills = Math.max(META.bests.kills, m.kills);
  META.bests.gold = Math.max(META.bests.gold, goldEarned);
  checkAchievements(m);
  saveMeta();
  el('goStats').innerHTML = `
    <div>Survived <b>${fmtTime(m.time)}</b></div>
    <div>Kills <b>${m.kills}</b></div>
    <div>Level <b>${m.level}</b></div>
    <div>Gold earned <b>+${goldEarned}</b></div>
  `;
  showScreen(null);
  el('gameOverModal').classList.remove('hidden');
  refreshMenuStats();
}
function checkAchievements(run){
  ACHIEVEMENTS.forEach(a=>{
    if(!META.achievements[a.id] && a.check(META, run)){
      META.achievements[a.id]=true;
      toast('Achievement: '+a.name);
    }
  });
}

// ---------- LEVEL UP ----------
function gainXP(amount){
  const p=state.player;
  state.xp += amount*p.xpMult*(state.activeEvent==='Double XP'?2:1);
  while(state.xp>=state.xpNeed){
    state.xp -= state.xpNeed;
    state.level++;
    state.xpNeed = Math.round(state.xpNeed*1.18+4);
    queueLevelUp();
  }
}
let levelUpQueue = 0;
function queueLevelUp(){
  levelUpQueue++;
  if(state.mode==='playing'){ openLevelUp(); }
}
function openLevelUp(){
  state.mode='levelup';
  sfx.levelup();
  const opts = buildUpgradeChoices();
  const wrap = el('levelCards'); wrap.innerHTML='';
  el('levelTitle').textContent = `LEVEL ${state.level}`;
  opts.forEach(opt=>{
    const card=document.createElement('div');
    card.className='levelCard';
    card.innerHTML = `<div class="lcIcon" style="background:${opt.col}"></div><div class="lcName">${opt.name}</div><div class="lcDesc">${opt.desc}</div>`;
    card.addEventListener('click', ()=>{ opt.apply(); closeLevelUp(); });
    wrap.appendChild(card);
  });
  el('levelUpModal').classList.remove('hidden');
}
function closeLevelUp(){
  el('levelUpModal').classList.add('hidden');
  levelUpQueue--;
  if(levelUpQueue>0){ openLevelUp(); }
  else { state.mode='playing'; lastT=performance.now(); }
}
function buildUpgradeChoices(){
  const p = state.player;
  const pool = [];
  p.weapons.forEach(w=>{
    if(w.level<WEAPON_DEFS[w.id].max && !w.evolved){
      pool.push({ name:WEAPON_DEFS[w.id].name+' +1', desc:'Level up: '+WEAPON_DEFS[w.id].desc, col:WEAPON_DEFS[w.id].col,
        apply:()=>{ w.level++; tryEvolve(w); } });
    }
  });
  if(p.weapons.length<6){
    Object.keys(WEAPON_DEFS).forEach(id=>{
      if(!p.weapons.find(w=>w.id===id)){
        pool.push({ name:'NEW: '+WEAPON_DEFS[id].name, desc:WEAPON_DEFS[id].desc, col:WEAPON_DEFS[id].col,
          apply:()=>{ p.weapons.push({id, level:1}); } });
      }
    });
  }
  const passiveIds = Object.keys(PASSIVE_DEFS);
  if(Object.keys(p.passives).length<6){
    passiveIds.forEach(id=>{
      if(!p.passives[id]){
        pool.push({ name:PASSIVE_DEFS[id].name, desc:PASSIVE_DEFS[id].desc, col:PASSIVE_DEFS[id].icon,
          apply:()=>{ p.passives[id]=1; PASSIVE_DEFS[id].apply(p); } });
      }
    });
  }
  pool.push({ name:'Vigor', desc:'+10% Max Health', col:'#ff5d73', apply:()=>{ p.maxHealth*=1.1; p.health=Math.min(p.maxHealth,p.health+p.maxHealth*0.1); } });
  pool.push({ name:'Swiftness', desc:'+8% Move Speed', col:'#7be0c4', apply:()=>{ p.speed*=1.08; } });
  // shuffle and take 3 unique
  for(let i=pool.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [pool[i],pool[j]]=[pool[j],pool[i]]; }
  return pool.slice(0,3);
}
function tryEvolve(w){
  const def = WEAPON_DEFS[w.id];
  if(def.evolveRune && w.level>=def.max && !w.evolved && state.player.runes && state.player.runes[def.evolveRune]){
    w.evolved = true;
    w.evolveName = def.evolveName;
    META.evolvedEver = true;
    sfx.evolve();
    toast('EVOLVED: '+def.evolveName+'!');
    spawnBigText(state.player.x, state.player.y-40, def.evolveName+' UNLOCKED', '#ffd35c');
  }
}

// ---------- SPAWNING ----------
function spawnPoint(){
  const ang = rand(0,Math.PI*2);
  const r = Math.max(W,H)*0.62 + rand(0,80);
  return { x: state.player.x+Math.cos(ang)*r, y: state.player.y+Math.sin(ang)*r };
}
function spawnEnemy(typeId, opts){
  const def = ENEMY_DEFS[typeId];
  const sp = spawnPoint();
  const elite = opts && opts.elite;
  const tMin = state.time/60;
  const scale = 1 + tMin*0.045;
  state.enemies.push({
    type:typeId, x:sp.x, y:sp.y,
    hp: def.hp*scale*(elite?4.2:1), maxHp: def.hp*scale*(elite?4.2:1),
    speed: def.speed*(elite?0.85:1), dmg: def.dmg*scale*(elite?1.6:1),
    size: def.size*(elite?1.45:1), xp: def.xp*(elite?5:1),
    elite: !!elite, art:def.art, erratic:def.erratic, wob:rand(0,10),
    hitFlash:0, slowT:0,
  });
}
function spawnBoss(){
  const def = BOSS_DEFS[state.biomeIndex % BOSS_DEFS.length];
  const sp = spawnPoint();
  const tMin = state.time/60;
  state.activeBoss = {
    id:def.id, name:def.name, x:sp.x, y:sp.y, hp:def.hp*(1+tMin*0.05), maxHp:def.hp*(1+tMin*0.05),
    speed:def.speed, dmg:def.dmg, size:def.size, art:def.art, def,
    timer:0, hitFlash:0, telegraph:0,
  };
  sfx.boss();
  toast('⚠ '+def.name+' has awoken!');
}
function spawnGem(x,y,val){ state.gems.push({x,y,val, t:rand(0,10)}); }
function spawnCoin(x,y,val){ state.coins.push({x,y,val}); }
function spawnChest(x,y,rarity){ state.chests.push({x,y,rarity:rarity||'common'}); }
function spawnRune(x,y,id){ state.runes.push({x,y,id}); }
function spawnParticle(x,y,col,life,vx,vy,size){
  state.particles.push({x,y,col,life,maxLife:life,vx:vx||0,vy:vy||0,size:size||4});
}
function spawnBigText(x,y,text,col){
  state.texts.push({x,y,text,col,life:1.2,big:true,vy:-30});
}
function spawnDmgText(x,y,dmg,crit){
  state.texts.push({x:x+rand(-6,6),y,text:Math.round(dmg).toString(),col:crit?'#ffd35c':'#ffffff',life:0.6,big:crit,vy:-50});
}
function shakeScreen(mag,t){ state.shake.mag=Math.max(state.shake.mag,mag); state.shake.t=Math.max(state.shake.t,t); }

// ---------- WEAPON FIRE LOGIC ----------
function nearestEnemy(x,y,maxR){
  let best=null, bd=maxR?maxR*maxR:Infinity;
  for(const en of state.enemies){
    const d = dist2(x,y,en.x,en.y);
    if(d<bd){ bd=d; best=en; }
  }
  if(state.activeBoss){
    const d = dist2(x,y,state.activeBoss.x,state.activeBoss.y);
    if(d<bd){ best=state.activeBoss; }
  }
  return best;
}
function fireWeapon(w, dt){
  const p = state.player;
  const def = WEAPON_DEFS[w.id];
  const key = w.id;
  p.cdTimers[key] = (p.cdTimers[key]||0) - dt;
  if(p.cdTimers[key]>0) return;
  const lvl = w.level;
  const dmg = def.base.dmg*(1+(lvl-1)*0.22)*(w.evolved?1.9:1)*p.dmgMult;
  const cd = def.base.cd*Math.pow(0.93,lvl-1)*p.cdMult*(w.evolved?0.75:1);
  let fired=false;

  if(key==='sword' || key==='daggers'){
    const target = nearestEnemy(p.x,p.y, 260);
    const ang = target? Math.atan2(target.y-p.y,target.x-p.x) : (p.facing>0?0:Math.PI);
    const shots = key==='daggers' ? 1+Math.floor(lvl/3) : 1;
    for(let i=0;i<shots;i++){
      state.projectiles.push({ x:p.x,y:p.y, vx:Math.cos(ang+rand(-0.2,0.2))*(def.base.speed||340), vy:Math.sin(ang+rand(-0.2,0.2))*(def.base.speed||340),
        dmg, life:1.1, pierce:key==='sword'?6:1, col:def.col, size:key==='sword'?20:8, kind:key, w });
    }
    fired=true;
  } else if(key==='firewand'){
    const target = nearestEnemy(p.x,p.y);
    if(target){
      const ang = Math.atan2(target.y-p.y,target.x-p.x);
      state.projectiles.push({ x:p.x,y:p.y, vx:Math.cos(ang)*def.base.speed, vy:Math.sin(ang)*def.base.speed,
        dmg, life:1.6, pierce: w.evolved?4:1, col:def.col, size:10, kind:'fire', explodeR: w.evolved?70:35, w });
      fired=true;
    }
  } else if(key==='lightning'){
    const target = nearestEnemy(p.x,p.y,def.base.range);
    if(target){
      chainLightning(p.x,p.y,target,dmg,(w.evolved?def.base.chains+3:def.base.chains),def.base.range,new Set());
      fired=true;
    }
  } else if(key==='boomerang'){
    const target = nearestEnemy(p.x,p.y) ;
    const ang = target? Math.atan2(target.y-p.y,target.x-p.x) : Math.atan2(p.moveY||0.01,p.moveX||1);
    const n = w.evolved?3:1;
    for(let i=0;i<n;i++){
      const a2 = ang + (i-(n-1)/2)*0.3;
      state.projectiles.push({ x:p.x,y:p.y, vx:Math.cos(a2)*def.base.speed, vy:Math.sin(a2)*def.base.speed,
        dmg, life:2.2, pierce:99, col:def.col, size:11, kind:'boomerang', origin:{x:p.x,y:p.y}, returning:false, traveled:0, range:def.base.range, w });
    }
    fired=true;
  } else if(key==='crossbow'){
    const target = nearestEnemy(p.x,p.y);
    if(target){
      const ang = Math.atan2(target.y-p.y,target.x-p.x);
      const n = w.evolved?3:1;
      for(let i=0;i<n;i++){
        state.projectiles.push({ x:p.x,y:p.y, vx:Math.cos(ang+rand(-0.06,0.06))*def.base.speed, vy:Math.sin(ang+rand(-0.06,0.06))*def.base.speed,
          dmg, life:1.4, pierce:def.base.pierce+(w.evolved?3:0), col:def.col, size:9, kind:'bolt', w });
      }
      fired=true;
    }
  } else if(key==='turret'){
    const target = nearestEnemy(p.x,p.y,def.base.range);
    if(target){
      const ang = Math.atan2(target.y-p.y,target.x-p.x);
      state.projectiles.push({ x:p.x,y:p.y, vx:Math.cos(ang)*def.base.speed, vy:Math.sin(ang)*def.base.speed,
        dmg:dmg*(1+p.turretBonus), life:1.0, pierce:1, col:def.col, size:8, kind:'turret', w });
      fired=true;
    }
  } else if(key==='iceorb'){
    // pulse freeze around player
    const r = def.base.radius*(w.evolved?1.6:1);
    let any=false;
    forEachFoe(en=>{
      if(dist2(p.x,p.y,en.x,en.y) < r*r){
        damageEnemy(en, dmg, false);
        en.slowT = Math.max(en.slowT, def.base.dur*(w.evolved?2:1));
        any=true;
      }
    });
    spawnParticle(p.x,p.y,'#9cdfff',0.4,0,0,r);
    if(any||true) fired=true;
  } else if(key==='poison'){
    state.hazards.push({ x:p.x,y:p.y, r:def.base.radius*(w.evolved?1.5:1), dmg:dmg*0.5, life:def.base.dur, tick:0, col:'#7fff5a' });
    fired=true;
  } else if(key==='darkorb'){
    const n = def.base.count + (w.evolved?2:0);
    for(let i=0;i<n;i++){
      const ang = (p.minionAngle||0) + i*(Math.PI*2/n);
      const ox = p.x+Math.cos(ang)*def.base.radius, oy=p.y+Math.sin(ang)*def.base.radius;
      if(Math.random()<0.3) spawnParticle(ox,oy,def.col,0.18,0,0,7);
      forEachFoe(en=>{ if(dist2(ox,oy,en.x,en.y)<22*22) damageEnemy(en,dmg*dt*4,false); });
    }
    fired=true;
  }
  if(fired){ p.cdTimers[key]=cd; if(['firewand','crossbow','turret','daggers','sword'].includes(key)) sfx.shoot(); }
}
function forEachFoe(fn){
  for(const en of state.enemies) fn(en);
  if(state.activeBoss) fn(state.activeBoss);
}
function chainLightning(x,y,target,dmg,chainsLeft,range,hitSet){
  if(!target||chainsLeft<0) return;
  hitSet.add(target);
  damageEnemy(target,dmg,false);
  spawnParticle(target.x,target.y,'#3cd2ff',0.25,0,0,6);
  state.particles.push({x,y,x2:target.x,y2:target.y,bolt:true,col:'#3cd2ff',life:0.12,maxLife:0.12});
  if(chainsLeft<=0) return;
  let best=null,bd=range*range;
  forEachFoe(en=>{ if(!hitSet.has(en)){ const d=dist2(target.x,target.y,en.x,en.y); if(d<bd){bd=d;best=en;} } });
  if(best) chainLightning(target.x,target.y,best,dmg*0.85,chainsLeft-1,range,hitSet);
}

// ---------- DAMAGE / COMBAT ----------
function damageEnemy(en, dmg, allowCrit){
  const p = state.player;
  let d = dmg;
  let crit=false;
  if(allowCrit && Math.random()<p.critChance){ d*=p.critMult; crit=true; }
  en.hp -= d;
  en.hitFlash = 0.1;
  spawnDmgText(en.x,en.y-10,d,crit);
  if(crit) sfx.crit(); else sfx.hit();
  if(en.hp<=0){ killEnemy(en); }
}
function killEnemy(en){
  if(en===state.activeBoss){
    state.kills++; META.bossKillsEver++;
    shakeScreen(18,0.5);
    spawnBigText(en.x,en.y-30,'BOSS DEFEATED!','#ffd35c');
    spawnChest(en.x,en.y,'legendary');
    sfx.death();
    for(let i=0;i<5;i++) spawnGem(en.x+rand(-30,30), en.y+rand(-30,30), 8);
    state.activeBoss=null;
    return;
  }
  const idx = state.enemies.indexOf(en);
  if(idx>=0) state.enemies.splice(idx,1);
  state.kills++;
  spawnGem(en.x,en.y, en.xp);
  if(en.elite){
    spawnParticle(en.x,en.y,'#ffd35c',0.5,0,0,20);
    if(Math.random()<0.35+metaUpgradeLevel('luck')*0.02){ spawnChest(en.x,en.y, Math.random()<0.5?'rare':'epic'); }
    if(Math.random()<0.25+metaUpgradeLevel('luck')*0.02){
      const runeIds=['rune_explosion','rune_chain','rune_rapid','rune_freeze'];
      spawnRune(en.x+rand(-10,10),en.y+rand(-10,10), choice(runeIds));
    }
  } else if(Math.random()<0.06){
    spawnCoin(en.x,en.y, randi(1,3));
  }
}

// ---------- UPDATE ----------
function update(dt){
  const s = state, p = s.player;
  s.time += dt;
  s.biomeTimer += dt;
  if(s.biomeTimer>=150){ s.biomeTimer=0; s.biomeIndex=(s.biomeIndex+1)%BIOMES.length; toast('Entering: '+BIOMES[s.biomeIndex].name); }

  // input / movement
  const mv = getMoveVector();
  p.moveX=mv.x; p.moveY=mv.y;
  if(mv.x!==0) p.facing = mv.x>0?1:-1;
  let spd = p.speed * (s.challenge==='Double Enemy Speed'?1:1);
  p.x += mv.x*spd*dt;
  p.y += mv.y*spd*dt;
  p.iframe = Math.max(0,p.iframe-dt);
  p.hitFlash = Math.max(0,p.hitFlash-dt);
  p.minionAngle = (p.minionAngle||0) + dt*1.6;

  // camera
  s.camera.x = p.x - W/2;
  s.camera.y = p.y - H/2;
  s.shake.t = Math.max(0,s.shake.t-dt);
  if(s.shake.t<=0) s.shake.mag=0;

  // weapons fire
  p.weapons.forEach(w=>fireWeapon(w,dt));

  // spawn enemies
  const tMin = s.time/60;
  const enemySpeedMul = s.challenge==='Double Enemy Speed'?2:1;
  s.spawnTimer -= dt;
  if(s.spawnTimer<=0 && s.enemies.length<420){
    const biome = BIOMES[s.biomeIndex];
    const n = 1+Math.floor(tMin/2);
    for(let i=0;i<Math.min(n,8);i++) spawnEnemy(choice(biome.enemies));
    s.spawnTimer = Math.max(0.18, 1.3 - tMin*0.045) * (s.activeEvent==='Blood Moon'?0.5:1);
  }
  s.eliteTimer += dt;
  if(s.eliteTimer>=180){ s.eliteTimer=0; const biome=BIOMES[s.biomeIndex]; spawnEnemy(choice(biome.enemies), {elite:true}); toast('An Elite has appeared!'); }
  s.bossTimer += dt;
  if(s.bossTimer>=300 && !s.activeBoss){ s.bossTimer=0; spawnBoss(); }

  // events
  if(!s.activeEvent){
    s.eventTimer -= dt;
    if(s.eventTimer<=0){ triggerEvent(); s.eventTimer = rand(70,100); }
  } else {
    s.eventTimeLeft -= dt;
    if(s.eventTimeLeft<=0){ s.activeEvent=null; }
  }
  if(s.activeEvent==='Meteor Shower' && Math.random()<dt*1.5){
    const ang=rand(0,Math.PI*2), r=rand(0,Math.max(W,H)*0.5);
    const mx=p.x+Math.cos(ang)*r, my=p.y+Math.sin(ang)*r;
    state.hazards.push({x:mx,y:my,r:34,dmg:14,life:0.9,tick:0,col:'#ff5a36',meteor:true,warn:0.5});
  }
  if(s.activeEvent==='Golden Rain' && Math.random()<dt*3){
    spawnCoin(p.x+rand(-260,260), p.y+rand(-260,260), randi(1,2));
  }

  // enemy AI
  for(const en of s.enemies){
    en.hitFlash = Math.max(0,en.hitFlash-dt);
    en.slowT = Math.max(0,en.slowT-dt);
    const slow = en.slowT>0 ? 0.45 : 1;
    let spd = en.speed*slow*enemySpeedMul*(s.activeEvent==='Enemy Frenzy'?1.5:1);
    let dx=p.x-en.x, dy=p.y-en.y;
    const d = Math.hypot(dx,dy)||1;
    let nx=dx/d, ny=dy/d;
    if(en.erratic){ en.wob+=dt*6; nx += Math.sin(en.wob)*0.6; ny += Math.cos(en.wob*0.8)*0.6; const l=Math.hypot(nx,ny)||1; nx/=l; ny/=l; }
    en.x += nx*spd*dt; en.y += ny*spd*dt;
    if(d<en.size*0.6+16 && p.iframe<=0){
      hurtPlayer(en.dmg);
    }
  }
  // boss AI
  if(s.activeBoss){
    const b = s.activeBoss;
    b.hitFlash = Math.max(0,b.hitFlash-dt);
    b.timer += dt;
    let dx=p.x-b.x, dy=p.y-b.y; const d=Math.hypot(dx,dy)||1;
    b.x += (dx/d)*b.speed*dt; b.y += (dy/d)*b.speed*dt;
    if(d<b.size*0.6+18 && p.iframe<=0) hurtPlayer(b.dmg);
    const def = b.def;
    if(def.summonsEvery && b.timer>=def.summonsEvery){ b.timer=0; for(let i=0;i<3;i++) spawnEnemy('skeleton'); toast('The Bone King summons skeletons!'); }
    if(def.firezoneEvery && b.timer>=def.firezoneEvery){ b.timer=0; for(let i=0;i<3;i++){ state.hazards.push({x:b.x+rand(-90,90),y:b.y+rand(-90,90),r:40,dmg:10,life:3,tick:0,col:'#ff5a36'}); } }
    if(def.teleportEvery && b.timer>=def.teleportEvery){ b.timer=0; const ang=rand(0,Math.PI*2); b.x=p.x+Math.cos(ang)*180; b.y=p.y+Math.sin(ang)*180; spawnParticle(b.x,b.y,'#9b5ce0',0.4,0,0,30); }
    if(def.laserEvery){
      if(b.telegraph>0){ b.telegraph-=dt; if(b.telegraph<=0){ if(Math.hypot(p.x-b.x,p.y-b.y)<260 && p.iframe<=0) hurtPlayer(b.dmg*1.4); shakeScreen(10,0.3); } }
      else if(b.timer>=def.laserEvery){ b.timer=0; b.telegraph=0.9; }
    }
  }

  // projectiles
  for(let i=s.projectiles.length-1;i>=0;i--){
    const pr = s.projectiles[i];
    pr.life -= dt;
    if(pr.kind==='boomerang'){
      pr.traveled += Math.hypot(pr.vx,pr.vy)*dt;
      if(!pr.returning && pr.traveled>pr.range){ pr.returning=true; }
      if(pr.returning){ const dx=p.x-pr.x, dy=p.y-pr.y; const d=Math.hypot(dx,dy)||1; pr.vx=dx/d*340; pr.vy=dy/d*340; if(d<20){ s.projectiles.splice(i,1); continue; } }
    }
    pr.x += pr.vx*dt; pr.y += pr.vy*dt;
    if(pr.life<=0){ s.projectiles.splice(i,1); continue; }
    let hit=false;
    forEachFoe(en=>{
      if(hit && pr.pierce<=1) return;
      if(dist2(pr.x,pr.y,en.x,en.y) < (en.size*0.5+pr.size*0.5)*(en.size*0.5+pr.size*0.5)){
        if(pr._hitset && pr._hitset.has(en)) return;
        damageEnemy(en, pr.dmg, true);
        if(pr.kind==='fire'){ explodeAt(pr.x,pr.y,pr.explodeR,pr.dmg*0.6); }
        pr.pierce--;
        if(!pr._hitset) pr._hitset=new Set();
        pr._hitset.add(en);
        hit=true;
      }
    });
    if(hit && pr.pierce<=0){ s.projectiles.splice(i,1); }
  }

  // hazards (poison clouds, fire zones, meteors)
  for(let i=s.hazards.length-1;i>=0;i--){
    const h = s.hazards[i];
    if(h.warn!==undefined && h.warn>0){ h.warn-=dt; continue; }
    h.life -= dt; h.tick -= dt;
    if(h.tick<=0){
      h.tick=0.4;
      forEachFoe(en=>{ if(dist2(h.x,h.y,en.x,en.y)<h.r*h.r) damageEnemy(en,h.dmg,false); });
      if(dist2(h.x,h.y,p.x,p.y)<h.r*h.r && p.iframe<=0 && h.meteor) hurtPlayer(h.dmg);
    }
    if(h.life<=0) s.hazards.splice(i,1);
  }

  // gems
  for(let i=s.gems.length-1;i>=0;i--){
    const g=s.gems[i];
    const d=Math.hypot(p.x-g.x,p.y-g.y);
    if(d<p.magnet){ const pull=260*dt/Math.max(40,d); g.x+=(p.x-g.x)*Math.min(1,pull); g.y+=(p.y-g.y)*Math.min(1,pull); }
    if(d<18){ gainXP(g.val); sfx.gem(); s.gems.splice(i,1); }
  }
  for(let i=s.coins.length-1;i>=0;i--){
    const c=s.coins[i];
    const d=Math.hypot(p.x-c.x,p.y-c.y);
    if(d<p.magnet){ const pull=260*dt/Math.max(40,d); c.x+=(p.x-c.x)*Math.min(1,pull); c.y+=(p.y-c.y)*Math.min(1,pull); }
    if(d<18){ s.gold += c.val*p.goldMult; sfx.coin(); s.coins.splice(i,1); }
  }
  for(let i=s.runes.length-1;i>=0;i--){
    const r=s.runes[i];
    if(Math.hypot(p.x-r.x,p.y-r.y)<22){
      p.runes = p.runes||{}; p.runes[r.id]=true;
      p.weapons.forEach(w=>tryEvolve(w));
      toast('Rune acquired!'); s.runes.splice(i,1);
    }
  }
  for(let i=s.chests.length-1;i>=0;i--){
    const c=s.chests[i];
    if(Math.hypot(p.x-c.x,p.y-c.y)<26){ openChest(c); s.chests.splice(i,1); }
  }

  // particles & texts
  for(let i=s.particles.length-1;i>=0;i--){ const pt=s.particles[i]; pt.life-=dt; pt.x+=(pt.vx||0)*dt; pt.y+=(pt.vy||0)*dt; if(pt.life<=0) s.particles.splice(i,1); }
  for(let i=s.texts.length-1;i>=0;i--){ const t=s.texts[i]; t.life-=dt; t.y+=t.vy*dt; if(t.life<=0) s.texts.splice(i,1); }

  if(p.health<=0){
    if(p.revives>0){ p.revives--; p.health=p.maxHealth*0.5; p.iframe=2; toast('Revived!'); }
    else { s.mode='gameover'; sfx.death(); endRun(); }
  }
  updateHUD();
}
function hurtPlayer(dmg){
  const p = state.player;
  const d = Math.max(1, dmg - p.armor);
  p.health -= d;
  p.iframe = 0.55;
  p.hitFlash = 0.25;
  sfx.hurt();
  shakeScreen(6,0.18);
}
function explodeAt(x,y,r,dmg){
  forEachFoe(en=>{ if(dist2(x,y,en.x,en.y)<r*r) damageEnemy(en,dmg,false); });
  spawnParticle(x,y,'#ff7a3c',0.3,0,0,r);
  shakeScreen(4,0.15);
}
function openChest(c){
  sfx.chest();
  shakeScreen(5,0.2);
  spawnBigText(c.x,c.y-20,'CHEST OPENED!','#f4c430');
  const rarityMult = {common:1,rare:1.8,epic:2.8,legendary:4.5}[c.rarity]||1;
  const goldGet = Math.round(rand(10,20)*rarityMult);
  state.gold += goldGet;
  for(let i=0;i<3;i++) spawnParticle(c.x+rand(-10,10),c.y+rand(-10,10),'#f4c430',0.6,rand(-40,40),rand(-60,-20),5);
  if(Math.random()<0.5){
    const runeIds=['rune_explosion','rune_chain','rune_rapid','rune_freeze'];
    spawnRune(c.x,c.y,choice(runeIds));
  } else if(state.player.weapons.length<6){
    const ids=Object.keys(WEAPON_DEFS).filter(id=>!state.player.weapons.find(w=>w.id===id));
    if(ids.length){ state.player.weapons.push({id:choice(ids),level:1}); toast('New weapon from chest!'); }
  } else {
    const w = choice(state.player.weapons);
    if(w.level<WEAPON_DEFS[w.id].max){ w.level++; tryEvolve(w); }
  }
}
function triggerEvent(){
  const events = ['Meteor Shower','Double XP','Blood Moon','Golden Rain','Enemy Frenzy'];
  const e = choice(events);
  state.activeEvent = e;
  state.eventTimeLeft = 14;
  toast('EVENT: '+e+'!');
}

// ---------- RENDER ----------
function render(){
  const s = state, p = s.player;
  ctx.save();
  let shx=0, shy=0;
  if(s.shake.t>0){ shx=rand(-s.shake.mag,s.shake.mag); shy=rand(-s.shake.mag,s.shake.mag); }
  ctx.translate(shx,shy);

  const biome = BIOMES[s.biomeIndex];
  const camX=s.camera.x, camY=s.camera.y;
  const ts=96; // tile size on screen
  const startX = Math.floor(camX/ts)*ts, startY = Math.floor(camY/ts)*ts;

  // -- floor tiles --
  ctx.imageSmoothingEnabled = false;
  if(FLOOR_TILE_IMG && FLOOR_TILE_IMG.complete && FLOOR_TILE_IMG.naturalWidth>0){
    for(let y=startY; y<camY+H+ts; y+=ts){
      for(let x=startX; x<camX+W+ts; x+=ts){
        ctx.drawImage(FLOOR_TILE_IMG, x-camX, y-camY, ts, ts);
      }
    }
    // biome color tint overlay
    ctx.fillStyle = biome.floorA + '99';
    ctx.fillRect(-shx,-shy,W,H);
  } else {
    // procedural checkerboard fallback
    ctx.fillStyle = biome.floorA;
    ctx.fillRect(-shx,-shy,W,H);
    const tile=64;
    const sx=Math.floor(camX/tile)*tile, sy=Math.floor(camY/tile)*tile;
    for(let y=sy;y<camY+H+tile;y+=tile){
      for(let x=sx;x<camX+W+tile;x+=tile){
        const checker=(Math.floor(x/tile)+Math.floor(y/tile))%2===0;
        ctx.fillStyle=checker?biome.floorA:biome.floorB;
        ctx.fillRect(x-camX,y-camY,tile,tile);
      }
    }
  }
  // accent cracks / vein lines (biome decoration)
  ctx.strokeStyle = biome.accent+'30';
  ctx.lineWidth=1.5;
  for(let y=startY;y<camY+H+ts;y+=ts*2){
    for(let x=startX;x<camX+W+ts;x+=ts*2){
      const seed=(Math.abs(x)*17+Math.abs(y)*31)%100;
      if(seed<22){
        ctx.beginPath();
        ctx.moveTo(x-camX+seed*0.6, y-camY+seed*0.3);
        ctx.lineTo(x-camX+ts-seed*0.4, y-camY+ts-seed*0.5);
        ctx.stroke();
      }
    }
  }

  // hazards (under entities)
  s.hazards.forEach(h=>{
    if(h.warn!==undefined && h.warn>0){
      ctx.strokeStyle='#ff5a3699'; ctx.lineWidth=2;
      ctx.beginPath(); ctx.arc(h.x-camX,h.y-camY,h.r,0,Math.PI*2); ctx.stroke();
      return;
    }
    ctx.fillStyle = h.col+'55';
    ctx.beginPath(); ctx.arc(h.x-camX,h.y-camY,h.r,0,Math.PI*2); ctx.fill();
  });

  // pickups
  s.gems.forEach(g=>{ drawSprite(ART.gem, g.x-camX, g.y-camY+Math.sin((s.time+g.t)*4)*2, ART.gem instanceof HTMLImageElement?26:14, {smooth:true}); });
  s.coins.forEach(c=>{ drawSprite(ART.coin, c.x-camX, c.y-camY, 13); });
  s.runes.forEach(r=>{ drawSprite(ART[r.id], r.x-camX, r.y-camY+Math.sin(s.time*5)*3, 16); });
  s.chests.forEach(c=>{ drawSprite(ART.chestClosed, c.x-camX, c.y-camY, ART.chestClosed instanceof HTMLImageElement?44:24, {smooth:true}); });

  // entities sorted by y
  const drawList = s.enemies.map(en=>({y:en.y,draw:()=>drawEnemy(en,camX,camY)}));
  if(s.activeBoss) drawList.push({y:s.activeBoss.y, draw:()=>drawBoss(s.activeBoss,camX,camY)});
  drawList.push({y:p.y, draw:()=>drawPlayer(p,camX,camY)});
  drawList.sort((a,b)=>a.y-b.y);
  drawList.forEach(d=>d.draw());

  // projectiles
  s.projectiles.forEach(pr=>{
    const ang = Math.atan2(pr.vy,pr.vx);
    ctx.save();
    ctx.translate(pr.x-camX,pr.y-camY);
    ctx.rotate(ang);
    ctx.fillStyle = pr.col;
    if(pr.kind==='boomerang'){ ctx.fillRect(-pr.size/2,-3,pr.size,6); ctx.fillRect(-3,-pr.size/2,6,pr.size); }
    else { ctx.beginPath(); ctx.ellipse(0,0,pr.size/2,pr.size/3.2,0,0,Math.PI*2); ctx.fill(); }
    ctx.restore();
  });

  // particles
  s.particles.forEach(pt=>{
    if(pt.bolt){
      ctx.strokeStyle=pt.col; ctx.lineWidth=2; ctx.globalAlpha=pt.life/pt.maxLife;
      ctx.beginPath(); ctx.moveTo(pt.x-camX,pt.y-camY); ctx.lineTo(pt.x2-camX,pt.y2-camY); ctx.stroke();
      ctx.globalAlpha=1;
      return;
    }
    ctx.globalAlpha = Math.max(0,pt.life/pt.maxLife);
    ctx.fillStyle = pt.col;
    ctx.beginPath(); ctx.arc(pt.x-camX,pt.y-camY,pt.size*(pt.life/pt.maxLife),0,Math.PI*2); ctx.fill();
    ctx.globalAlpha=1;
  });

  // floating text
  s.texts.forEach(t=>{
    ctx.globalAlpha = Math.min(1,t.life*2);
    ctx.font = t.big? 'bold 18px monospace' : 'bold 13px monospace';
    ctx.fillStyle = t.col;
    ctx.textAlign='center';
    ctx.fillText(t.text, t.x-camX, t.y-camY);
    ctx.globalAlpha=1;
  });

  // event overlay tint
  if(s.activeEvent==='Blood Moon'){ ctx.fillStyle='#ff2d2d22'; ctx.fillRect(-shx,-shy,W,H); }
  if(s.activeEvent==='Double XP'){ ctx.fillStyle='#3cd2ff11'; ctx.fillRect(-shx,-shy,W,H); }

  ctx.restore();
}
function drawEnemy(en,camX,camY){
  const x=en.x-camX, y=en.y-camY;
  const isRealImg = ART[en.art] instanceof HTMLImageElement;
  const displaySize = en.size * (isRealImg ? 2.2 : 1.0);
  if(en.elite){ ctx.strokeStyle='#ffd35c'; ctx.lineWidth=2; ctx.beginPath(); ctx.arc(x,y,displaySize*0.55,0,Math.PI*2); ctx.stroke(); }
  drawSprite(ART[en.art], x, y, displaySize, { tint: en.hitFlash>0?'#ffffff':(en.slowT>0?'#9cdfff':null), smooth:true });
  // hp bar below sprite
  const barW = Math.max(displaySize, 28);
  if(en.hp<en.maxHp){
    ctx.fillStyle='#000a'; ctx.fillRect(x-barW/2,y+displaySize*0.5+2,barW,4);
    ctx.fillStyle='#d4313d'; ctx.fillRect(x-barW/2,y+displaySize*0.5+2,barW*clamp(en.hp/en.maxHp,0,1),4);
  }
}
function drawBoss(b,camX,camY){
  const x=b.x-camX,y=b.y-camY;
  if(b.telegraph>0){ ctx.strokeStyle='#ff3b3bcc'; ctx.lineWidth=3; ctx.beginPath(); ctx.arc(x,y,260,0,Math.PI*2); ctx.stroke(); }
  const isRealImg = ART[b.art] instanceof HTMLImageElement;
  const bsize = b.size * (isRealImg ? 2.8 : 1.0);
  // glow pulse beneath boss
  ctx.save();
  ctx.globalAlpha = 0.22 + Math.sin(Date.now()*0.004)*0.08;
  ctx.fillStyle = '#ff3b3b';
  ctx.beginPath(); ctx.arc(x,y,bsize*0.6,0,Math.PI*2); ctx.fill();
  ctx.restore();
  drawSprite(ART[b.art], x, y, bsize, { tint: b.hitFlash>0?'#ffffff':null, smooth:true });
  // inline boss hp bar (bossBar HUD covers it but this shows spatially)
  const bw = bsize*1.1;
  ctx.fillStyle='#000a'; ctx.fillRect(x-bw/2,y+bsize*0.52+2,bw,6);
  ctx.fillStyle='#ff3b3b'; ctx.fillRect(x-bw/2,y+bsize*0.52+2,bw*clamp(b.hp/b.maxHp,0,1),6);
}
function drawPlayer(p,camX,camY){
  const x=p.x-camX, y=p.y-camY;
  const pSize = p.spriteIsReal ? 56 : 34;
  drawSprite(p.sprite, x, y, pSize, { flip:p.facing<0, tint:p.hitFlash>0?'#ff3b3b':(p.iframe>0?'#ffffff':null), alpha:p.iframe>0?0.7:1, smooth:p.spriteIsReal });
  // hp bar below feet
  const barOff = p.spriteIsReal ? 30 : 18;
  ctx.fillStyle='#000a'; ctx.fillRect(x-22,y+barOff,44,5);
  ctx.fillStyle = p.health/p.maxHealth<0.3?'#ff3b3b':'#d4313d';
  ctx.fillRect(x-22,y+barOff,44*clamp(p.health/p.maxHealth,0,1),5);
  if(p.hasMinion){
    const ang = (p.minionAngle||0);
    const mx=x+Math.cos(ang)*40, my=y+Math.sin(ang)*40;
    ctx.fillStyle='#9b5ce0'; ctx.beginPath(); ctx.arc(mx,my,6,0,Math.PI*2); ctx.fill();
  }
}

// ---------- HUD ----------
function updateHUD(){
  const s=state, p=s.player;
  el('hudLevel').textContent = 'Lv '+s.level;
  el('hudTime').textContent = fmtTime(s.time);
  el('hudKills').textContent = s.kills;
  el('hudGold').textContent = Math.floor(s.gold);
  el('xpFill').style.width = clamp(s.xp/s.xpNeed,0,1)*100+'%';
  if(s.activeBoss){
    el('bossBar').classList.remove('hidden');
    el('bossName').textContent = s.activeBoss.name;
    el('bossFill').style.width = clamp(s.activeBoss.hp/s.activeBoss.maxHp,0,1)*100+'%';
  } else el('bossBar').classList.add('hidden');
  if(s.activeEvent){ el('eventBanner').textContent = s.activeEvent; el('eventBanner').classList.remove('hidden'); }
  else el('eventBanner').classList.add('hidden');
}

// ---------- MAIN LOOP ----------
function loop(t){
  const dt = Math.min((t-lastT)/1000, 0.05);
  lastT = t;
  if(state && state.mode==='playing'){ update(dt); render(); }
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);

// ---------- UI WIRING ----------
el('btnPlay').addEventListener('click', ()=>{ buildCharSelect(); showScreen('charselect'); el('challengeNote').classList.add('hidden'); pendingChallenge=null; });
el('btnDaily').addEventListener('click', ()=>{ pendingChallenge = dailyModifier(); buildCharSelect(); showScreen('charselect'); el('challengeNote').textContent='Daily Challenge: '+pendingChallenge; el('challengeNote').classList.remove('hidden'); });
el('btnShop').addEventListener('click', ()=>{ buildShop(); showScreen('shop'); });
el('btnAch').addEventListener('click', ()=>{ buildAchievements(); showScreen('achievements'); });
el('backFromShop').addEventListener('click', ()=> showScreen('menu'));
el('backFromAch').addEventListener('click', ()=> showScreen('menu'));
el('backFromChar').addEventListener('click', ()=> showScreen('menu'));
el('btnPause').addEventListener('click', ()=>{
  if(state.mode==='playing'){ state.mode='paused'; el('pauseModal').classList.remove('hidden'); }
});
el('btnResume').addEventListener('click', ()=>{ el('pauseModal').classList.add('hidden'); state.mode='playing'; lastT=performance.now(); });
el('btnQuit').addEventListener('click', ()=>{ el('pauseModal').classList.add('hidden'); showScreen('menu'); refreshMenuStats(); });
el('btnRestart').addEventListener('click', ()=>{ el('gameOverModal').classList.add('hidden'); buildCharSelect(); showScreen('charselect'); });
el('btnMenu2').addEventListener('click', ()=>{ el('gameOverModal').classList.add('hidden'); showScreen('menu'); refreshMenuStats(); });

let pendingChallenge = null;
function dailyModifier(){
  const d=new Date();
  const seed = d.getFullYear()*372+d.getMonth()*31+d.getDate();
  const mods=['Double Enemy Speed','One HP Mode','No Healing Drops','Random Weapon Start'];
  return mods[seed%mods.length];
}
const origStartRun = startRun;
startRun = function(charId){ origStartRun(charId, pendingChallenge); pendingChallenge=null; };

// ---------- BOOT ----------
loadMeta();
showScreen('menu');

</script>
